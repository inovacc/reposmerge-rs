version: 2
updates:
  # Keep GitHub Actions pinned versions current (automates the action-bump chore).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  # Keep Cargo dependencies current.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
    groups:
      cargo:
        patterns: ["*"]
