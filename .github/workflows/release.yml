name: Release

# Cross-platform binary release (GoReleaser-equivalent). Fires on a semver tag.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu,  ext: "" }
          - { os: ubuntu-latest,  target: aarch64-unknown-linux-gnu, ext: "" }
          - { os: macos-latest,   target: x86_64-apple-darwin,       ext: "" }
          - { os: macos-latest,   target: aarch64-apple-darwin,      ext: "" }
          - { os: windows-latest, target: x86_64-pc-windows-msvc,    ext: ".exe" }
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Install cross linker (aarch64 linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin="target/${{ matrix.target }}/release/reposmerge${{ matrix.ext }}"
          name="reposmerge-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p dist
          cp "$bin" "dist/${name}${{ matrix.ext }}"
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
