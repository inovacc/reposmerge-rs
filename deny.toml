# cargo-deny configuration. Run: cargo deny check
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on any security advisory for a dependency in the tree.
yanked = "deny"

[bans]
multiple-versions = "warn"
wildcards = "warn"

[licenses]
# Allow the permissive licenses this crate and its deps use.
allow = [
    "BSD-3-Clause",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "ISC",
    "Zlib",
    "BSD-2-Clause",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
